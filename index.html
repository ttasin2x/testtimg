<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চূড়ান্ত ফলাফল | স্কাউট হ্যান্ডবুক কুইজ ২০২৬</title>
    
    <meta name="description" content="স্কাউট হ্যান্ডবুক কুইজ ২০২৬ এর চূড়ান্ত ফলাফল প্রকাশিত হয়েছে। এখনই আপনার রেজাল্ট চেক করুন।">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ambient-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="dust" id="dust-container"></div>
    <canvas id="confetti" style="position: fixed; inset: 0; z-index: 100; pointer-events: none;"></canvas>

    <div class="wrapper" id="mainWrapper">
        <div class="glass-panel">
            
            <header class="header animate-in del-1">
                <div class="hero-banner">
                    <img src="photos/banner.webp" alt="Scout Handbook Quiz 2026 Banner">
                </div>
            </header>

            <section class="announcement-widget animate-in del-2">
                <div class="announce-icon-wrapper">
                    <i class="fa-solid fa-bullhorn"></i>
                </div>
                <div class="announce-content">
                    <h3 class="announce-title">বিশেষ ঘোষণা</h3>
                    <p class="announce-text">
                        আগামী <strong class="text-red">১৮ জুন</strong> থেকে 
                        <a href="https://maps.app.goo.gl/ebeMqS6QzJyM1oHu5" target="_blank" class="announce-link"><i class="fa-solid fa-location-dot"></i> কাকরাইল স্কাউট শপ</a> 
                        এবং অনলাইনে <strong>স্কাউট হ্যান্ডবুক</strong> বইটির নতুন সংস্করণ পাওয়া যাবে। বিস্তারিত জানতে 
                        <a href="https://www.facebook.com/Scouthandbook1" target="_blank" class="announce-link"><i class="fa-brands fa-facebook"></i> আমাদের পেজে</a> 
                        চোখ রাখুন।
                    </p>
                </div>
            </section>

            <!-- PREMIUM MAIN RESULT BOARD -->
            <section class="result-dashboard animate-in del-3">
                <div class="dashboard-header">
                    <div class="title-wrap">
                        <i class="fa-solid fa-ranking-star glow-icon"></i>
                        <h2>চূড়ান্ত ফলাফল</h2>
                        <p>স্কাউট হ্যান্ডবুক কুইজ ২০২৬-এ অংশগ্রহণকারী সবার ফলাফল নিচে দেওয়া হলো।</p>
                    </div>
                </div>

                <div class="dashboard-body">
                    <div class="result-tabs">
                        <button class="tab-btn active" data-tab="scout"><i class="fa-solid fa-campground"></i> স্কাউট শাখা</button>
                        <button class="tab-btn" data-tab="rover"><i class="fa-solid fa-compass"></i> রোভার / লিডার</button>
                    </div>

                    <div class="search-box-main">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="resultSearch" placeholder="নাম বা ইউনিটের নাম দিয়ে আপনার রেজাল্ট খুঁজুন...">
                    </div>

                    <div class="result-list-container" id="resultContainer">
                        <!-- JavaScript will inject FULL results here -->
                    </div>
                </div>
            </section>

            <footer class="footer animate-in del-4">
                <div class="social-actions">
                    <a href="https://www.facebook.com/Scouthandbook1" target="_blank" rel="noopener noreferrer" class="social-btn fb-btn" aria-label="Facebook Page">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                </div>
                <div class="copyright-text">
                    © ২০২৬ অনলাইন স্কাউট হ্যান্ডবুক কুইজ। সর্বস্বত্ব সংরক্ষিত।
                </div>
            </footer>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
